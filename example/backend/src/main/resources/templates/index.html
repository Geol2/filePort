<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: '첨부파일 업로드'">첨부파일 업로드</title>

    <link  rel="stylesheet" th:href="@{/dropzone.min.css}">
    <link  rel="stylesheet" th:href="@{/dropzoneUploader.css}">
    <script th:src="@{/dropzone.min.js}"></script>
    <script th:src="@{/dropzoneUploader.js}"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 13px;
            background: #f4f6f8;
            margin: 0;
            padding: 24px;
        }
        h2 { margin: 0 0 16px; font-size: 16px; color: #333; }
        .page-wrap {
            max-width: 860px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 24px;
        }
        #tableWrapper {
            border: 2px dashed #ccc;
            border-radius: 6px;
            background: #fafafa;
            transition: border-color .25s, background .25s;
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }
        #tableWrapper.drag-over { border-color: #4285FF; background: #e8f0fe; }
        .table-scroll { flex: 1; overflow-y: auto; max-height: 320px; }
        .btn-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }
        .btn:disabled { opacity: .5; cursor: default; }
        #btnFileAdd { background: #fff; border: 1px solid #4285FF; color: #4285FF; }
        #btnFileAdd:hover:not(:disabled) { background: #e8f0fe; }
        #btnInsert  { background: #4285FF; color: #fff; }
        #btnInsert:hover:not(:disabled)  { background: #2a6de0; }
        #statusMsg {
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }
        #statusMsg.success { background: #e8f5e9; color: #2e7d32; display: block; }
        #statusMsg.error   { background: #ffebee; color: #c62828; display: block; }
    </style>
</head>
<body>
<div class="page-wrap">
    <h2 th:text="${pageTitle} ?: '첨부파일 업로드'">첨부파일 업로드</h2>

    <div id="tableWrapper" class="table-wrapper">
        <div class="table-scroll">
            <table id="fileTable">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="checkAll"></th>
                        <th>파일명</th>
                        <th>문서종류</th>
                        <th>크기</th>
                        <th>상태</th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="fileList"></tbody>
            </table>
        </div>
        <div class="table-footer">
            <span id="footerSize">0 Bytes · 0건</span>
            <div class="footer-progress">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span id="footerPercent">0%</span>
            </div>
        </div>
    </div>

    <div class="btn-area">
        <button class="btn" id="btnFileAdd">파일 추가</button>
        <button class="btn" id="btnInsert">등록</button>
    </div>

    <div id="statusMsg"></div>
</div>

<script th:inline="javascript">
    Dropzone.autoDiscover = false;

    const uploader = DropzoneUploader.createUploader({
        uploadUrl:   /*[[@{/upload}]]*/ '/upload',
        showDocKind: true,

        getExtra: function() {
            return {
                title:  /*[[${pageTitle} ?: '테스트 문서']]*/ '테스트 문서',
                userId: /*[[${userId}  ?: 'user01']]*/ 'user01',
            };
        },

        onSubmit: function(payload) {
            fetch(/*[[@{/api/contents/insert}]]*/ '/api/contents/insert', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ files: payload.files, ...payload.extra }),
            })
            .then(function(res) {
                if (!res.ok) throw new Error('서버 오류: ' + res.status);
                showStatus('등록이 완료되었습니다.', 'success');
                payload.done(true);
            })
            .catch(function(err) {
                showStatus('등록 중 오류가 발생했습니다: ' + err.message, 'error');
                payload.done(false);
            });
        },
    });

    uploader.init();

    document.getElementById('btnInsert').addEventListener('click', function() {
        if (uploader.fileManager.files.length === 0) {
            alert('첨부할 파일을 먼저 추가해 주세요.');
            return;
        }
        uploader.startSubmit();
    });

    function showStatus(msg, type) {
        var el = document.getElementById('statusMsg');
        el.textContent = msg;
        el.className = type;
    }
</script>
</body>
</html>
