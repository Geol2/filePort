<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropzone 첨부파일 예제</title>

    <!-- Dropzone 기본 스타일 (프리뷰 UI 등) -->
    <link rel="stylesheet" href="../dropzone/dropzone.min.css">
    <!-- 커스텀 업로더 스타일 (테이블·상태·버튼) -->
    <link rel="stylesheet" href="../dropzone/dropzoneUploader.css">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 13px;
            background: #f4f6f8;
            margin: 0;
            padding: 24px;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 16px;
            color: #333;
        }

        .page-wrap {
            max-width: 860px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 24px;
        }

        /* ── 드롭존 래퍼 ── */
        #tableWrapper {
            border: 2px dashed #ccc;
            border-radius: 6px;
            background: #fafafa;
            transition: border-color .25s, background .25s;
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        #tableWrapper.drag-over {
            border-color: #4285FF;
            background: #e8f0fe;
        }

        .table-scroll {
            flex: 1;
            overflow-y: auto;
            max-height: 320px;
        }

        /* ── 버튼 영역 ── */
        .btn-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }

        .btn:disabled {
            opacity: .5;
            cursor: default;
        }

        #btnFileAdd {
            background: #fff;
            border: 1px solid #4285FF;
            color: #4285FF;
        }

        #btnFileAdd:hover:not(:disabled) { background: #e8f0fe; }

        #btnInsert {
            background: #4285FF;
            color: #fff;
        }

        #btnInsert:hover:not(:disabled) { background: #2a6de0; }

        /* ── 결과 로그 ── */
        #logBox {
            margin-top: 20px;
            padding: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            min-height: 60px;
            max-height: 160px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .log-label {
            font-size: 11px;
            color: #888;
            margin: 16px 0 4px;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <h2>📎 Dropzone 첨부파일 예제</h2>

    <!--
        dropzoneElementConfig 기본값과 일치하는 ID를 사용해야 합니다.
          wrapperId      → #tableWrapper   (드래그·드롭 영역)
          fileAddBtnId   → #btnFileAdd     (파일 선택 버튼 — clickable)
          tableId        → #fileTable
          tbodyId        → #fileList
          checkAllId     → #checkAll
          footerSizeId   → #footerSize
          progressFillId → #progressFill
          footerPercentId→ #footerPercent
    -->
    <div id="tableWrapper" class="table-wrapper">

        <div class="table-scroll">
            <table id="fileTable">
                <thead>
                    <tr>
                        <th style="width:4%;text-align:center">
                            <input type="checkbox" id="checkAll"
                                   onchange="fileManager.toggleAll(this.checked)">
                        </th>
                        <th>파일명</th>
                        <th style="width:18%">문서종류</th>
                        <th style="width:15%">크기</th>
                        <th style="width:10%;text-align:center">상태</th>
                        <th style="width:6%;text-align:center">작업</th>
                    </tr>
                </thead>
                <tbody id="fileList"></tbody>
            </table>
        </div>

        <!-- 하단 통계 바 -->
        <div class="table-footer">
            <span id="footerSize">0 Bytes · 0건</span>
            <div class="footer-progress">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span id="footerPercent">0%</span>
            </div>
        </div>
    </div>

    <!-- 파일 추가 / 등록 버튼 -->
    <div class="btn-area">
        <button class="btn" id="btnFileAdd">파일 추가</button>
        <button class="btn" id="btnInsert" onclick="fnFileAddSubmit()">등록</button>
    </div>

    <!-- 결과 로그 -->
    <p class="log-label">📋 콘솔 로그</p>
    <div id="logBox">(파일을 추가하거나 등록 버튼을 클릭하면 로그가 출력됩니다)</div>
</div>

<!-- ① Dropzone 라이브러리 -->
<script src="../dropzone/dropzone.min.js"></script>

<script>
    // Dropzone의 폼 자동 감지 비활성화 (div를 드롭존으로 쓸 때 필요)
    Dropzone.autoDiscover = false;

    // ── 페이지별 i18n 메시지 스텁 ──────────────────────────────────────
    // 실제 프로젝트에서는 서버에서 내려오는 fnGetMessage() 함수를 사용합니다.
    function fnGetMessage(key) {
        return ({
            'web.confirm.file.fileUploadPlz': '파일을 이곳에 드래그하거나 [파일 추가]를 클릭하세요',
            'web.file.countUnit'            : '건',
            'web.file.status.pending'       : '대기',
            'web.file.status.uploading'     : '업로드중',
            'web.file.status.success'       : '완료',
            'web.file.status.error'         : '오류',
            'web.js.error.upload'           : '업로드 중 오류가 발생했습니다. 다시 첨부해 주세요.',
        })[key] || key;
    }

    // ── 문서종류 컬럼 표시 여부 (true=표시, false=숨김) ─────────────────
    var B_DOCKIND = true;

    // ── dropzoneElementConfig 오버라이드 (기본값과 동일하므로 생략 가능) ──
    // window.dropzoneElementConfig = { ... };

    // ── dropzoneSubmitConfig 오버라이드 ────────────────────────────────
    window.dropzoneSubmitConfig = {
        submitBtnId         : 'btnInsert',
        popupSelector       : null,
        getExtraContentsInfo: function() { return { boardTitle: '테스트 제목' }; },
        getExtraAttrInputs  : function() { return []; },
        onSuccess           : function() { log('✅ onSuccess 콜백 실행 완료'); }
    };
</script>

<!-- ② 커스텀 업로더 (dropzoneElementConfig·fileManager·myDropzone 초기화) -->
<script src="../dropzone/dropzoneUploader.js"></script>

<script>
    // ── 로그 헬퍼 ─────────────────────────────────────────────────────
    function log(msg) {
        var box = document.getElementById('logBox');
        var time = new Date().toLocaleTimeString('ko-KR');
        box.textContent += '\n[' + time + '] ' + msg;
        box.scrollTop = box.scrollHeight;
    }

    // ── 업로드 시뮬레이션 ──────────────────────────────────────────────
    // 실제 프로젝트에서는 myDropzone.processQueue()를 호출하고
    // Dropzone "success" 이벤트에서 서버 응답(json.id)을 받아 처리합니다.
    // 이 예제에서는 백엔드 없이 동작을 확인할 수 있도록 타이머로 시뮬레이션합니다.
    function simulateUpload(pendingItems, onAllDone) {
        var idx = 0;

        function uploadNext() {
            if (idx >= pendingItems.length) {
                onAllDone();
                return;
            }
            var fileItem = pendingItems[idx++];
            log('⬆️  업로드 시작: ' + fileItem.name);
            fileManager.updateStatus(fileItem.id, 'uploading');

            // 800ms 후 성공 처리 (서버 응답 흉내)
            setTimeout(function() {
                fileItem.serverFileNm = 'SRV_' + Date.now(); // 서버가 돌려준 저장 파일명
                fileManager.updateStatus(fileItem.id, 'success', new Date().toLocaleString('ko-KR'));
                log('✅ 업로드 성공: ' + fileItem.name + ' → ' + fileItem.serverFileNm);
                uploadNext();
            }, 800);
        }

        uploadNext();
    }

    // ── fnFileAddSubmit : 등록 버튼 클릭 시 호출 ─────────────────────
    // dropzoneUploader.js가 참조하는 전역 함수입니다.
    function fnFileAddSubmit() {
        if (isProcessing) {
            log('⚠️  이미 처리 중입니다.');
            return;
        }
        if (fileManager.files.length === 0) {
            alert('첨부할 파일을 먼저 추가해 주세요.');
            return;
        }

        isProcessing = true;
        document.getElementById(dropzoneSubmitConfig.submitBtnId).disabled = true;
        log('🔵 등록 버튼 클릭 — 파일 수: ' + fileManager.files.length);

        // Dropzone 큐에 올라간(아직 업로드 안 된) 파일만 필터링
        var pendingDropzone = fileManager.files.filter(function(f) {
            return f.dropzoneFile !== null && f.status === 'pending';
        });

        if (pendingDropzone.length > 0) {
            // ── 실제 프로젝트: myDropzone.processQueue() 호출 후
            //    "queuecomplete" 이벤트에서 fnGoSubmitDropzone() 호출
            // ── 이 예제: 시뮬레이션으로 대체
            simulateUpload(pendingDropzone, function() {
                fnGoSubmitDropzone();
            });
        } else {
            // 새 파일 없음 (기존·스캔 파일만) → 바로 등록
            fnGoSubmitDropzone();
        }
    }

    // ── fnGoSubmitDropzone : 서버 콘텐츠 등록 AJAX ───────────────────
    // 모든 파일 업로드 완료 후 실제 등록 요청을 보내는 함수입니다.
    // 실제 프로젝트에서는 $.ajax({ url: '/contents/insert', ... }) 형태로 사용합니다.
    function fnGoSubmitDropzone() {
        // 등록할 파일 목록 구성
        var fileList = fileManager.files.map(function(f) {
            if (f.isOld) {
                return { isOld: true, fileInfoId: f.fileInfoId, docInfoId: f.docInfoId };
            }
            if (f.isScanned) {
                return { isScanned: true, fileNm: f.serverFileNm, fdKey01: f.fdKey01, fdKey02: f.fdKey02 };
            }
            return { fileNm: f.serverFileNm, srcFileNm: f.name };
        });

        // 추가 콘텐츠 정보 (제목·작성자 등 페이지별 입력값)
        var extra = dropzoneSubmitConfig.getExtraContentsInfo();

        var payload = Object.assign({}, extra, { files: fileList });
        log('📤 서버 등록 요청 payload:\n' + JSON.stringify(payload, null, 2));

        // ── 실제 프로젝트에서는 아래 AJAX 주석을 해제하여 사용 ──────────
        // $.ajax({
        //     url    : '/api/contents/insert',
        //     method : 'POST',
        //     contentType: 'application/json',
        //     data   : JSON.stringify(payload),
        //     success: function(res) {
        //         fileManager.markAllRegistered();
        //         dropzoneSubmitConfig.onSuccess(res);
        //         isProcessing = false;
        //         document.getElementById(dropzoneSubmitConfig.submitBtnId).disabled = false;
        //     },
        //     error  : function() { alert('등록 중 오류가 발생했습니다.'); isProcessing = false; }
        // });

        // ── 이 예제: 즉시 성공 처리 ──────────────────────────────────
        setTimeout(function() {
            fileManager.markAllRegistered();
            dropzoneSubmitConfig.onSuccess();
            isProcessing = false;
            document.getElementById(dropzoneSubmitConfig.submitBtnId).disabled = false;
            log('🎉 콘텐츠 등록 완료!');
        }, 400);
    }

    // ── 초기 로그 ─────────────────────────────────────────────────────
    log('🚀 Dropzone 업로더 초기화 완료');
</script>
</body>
</html>
