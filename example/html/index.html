<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filePort 첨부파일 예제</title>

    <link rel="stylesheet" href="../../src/filePort.css">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 13px;
            background: #f4f6f8;
            margin: 0;
            padding: 24px;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 16px;
            color: #333;
        }

        .page-wrap {
            max-width: 860px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 24px;
        }

        /* ── 드롭존 래퍼 ── */
        #tableWrapper {
            border: 2px dashed #ccc;
            border-radius: 6px;
            background: #fafafa;
            transition: border-color .25s, background .25s;
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        #tableWrapper.drag-over {
            border-color: #4285FF;
            background: #e8f0fe;
        }

        .table-scroll {
            flex: 1;
            overflow-y: auto;
            max-height: 320px;
        }

        /* ── 버튼 영역 ── */
        .btn-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }

        .btn:disabled { opacity: .5; cursor: default; }

        #btnFileAdd {
            background: #fff;
            border: 1px solid #4285FF;
            color: #4285FF;
        }

        #btnFileAdd:hover:not(:disabled) { background: #e8f0fe; }

        #btnInsert {
            background: #4285FF;
            color: #fff;
        }

        #btnInsert:hover:not(:disabled) { background: #2a6de0; }

        /* ── 결과 로그 ── */
        #logBox {
            margin-top: 20px;
            padding: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            min-height: 60px;
            max-height: 160px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .log-label {
            font-size: 11px;
            color: #888;
            margin: 16px 0 4px;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <h2>첨부파일 예제 (백엔드 없이 실행)</h2>

    <!--
        elementConfig 기본값과 일치하는 ID를 사용해야 합니다.
          wrapperId       → #tableWrapper
          fileAddBtnId    → #btnFileAdd
          tableId         → #fileTable
          tbodyId         → #fileList
          checkAllId      → #checkAll
          footerSizeId    → #footerSize
          progressFillId  → #progressFill
          footerPercentId → #footerPercent
    -->
    <div id="tableWrapper" class="table-wrapper">
        <div class="table-scroll">
            <table id="fileTable">
                <thead>
                    <tr>
                        <th style="width:4%;text-align:center">
                            <input type="checkbox" id="checkAll">
                        </th>
                        <th>파일명</th>
                        <th style="width:18%">문서종류</th>
                        <th style="width:15%">크기</th>
                        <th style="width:10%;text-align:center">상태</th>
                        <th style="width:6%;text-align:center">작업</th>
                    </tr>
                </thead>
                <tbody id="fileList"></tbody>
            </table>
        </div>

        <div class="table-footer">
            <span id="footerSize">0 Bytes · 0건</span>
            <div class="footer-progress">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span id="footerPercent">0%</span>
            </div>
        </div>
    </div>

    <div class="btn-area">
        <button class="btn" id="btnFileAdd">파일 추가</button>
        <button class="btn" id="btnInsert">등록</button>
    </div>

    <p class="log-label">콘솔 로그</p>
    <div id="logBox">(파일을 추가하거나 등록 버튼을 클릭하면 로그가 출력됩니다)</div>
</div>

<!-- Dropzone JS/CSS 별도 로드 불필요 — filePort.iife.js에 포함 -->
<script src="../../dist/filePort.iife.js"></script>

<script>
    // ── 로그 헬퍼 ─────────────────────────────────────────────────────
    function log(msg) {
        var box = document.getElementById('logBox');
        var time = new Date().toLocaleTimeString('ko-KR');
        box.textContent += '\n[' + time + '] ' + msg;
        box.scrollTop = box.scrollHeight;
    }

    // ── 업로더 초기화 ─────────────────────────────────────────────────
    var uploader = FilePort.createUploader({
        uploadUrl:   '/upload',    // 실제 서버 없음 — onSubmit에서 시뮬레이션
        showDocKind: true,
        docKindList: [
            { id: 'CONTRACT',    name: '계약서' },
            { id: 'INVOICE',     name: '청구서' },
            { id: 'REPORT',      name: '보고서' },
            { id: 'CERTIFICATE', name: '증명서' },
            { id: 'OTHER',       name: '기타' },
        ],

        getExtra: function() {
            return { title: '테스트 문서', userId: 'user01' };
        },

        // ── 실제 프로젝트: 서버 fetch 호출
        // ── 이 예제: 타이머로 시뮬레이션
        onSubmit: function(payload) {
            log('📤 서버 등록 요청 payload:\n' + JSON.stringify({
                files: payload.files,
                extra: payload.extra,
            }, null, 2));

            setTimeout(function() {
                payload.done(true);
                log('🎉 등록 완료!');
            }, 400);
        },
    });

    uploader.init();

    // ── 등록 버튼 ─────────────────────────────────────────────────────
    document.getElementById('btnInsert').addEventListener('click', function() {
        if (uploader.fileManager.files.length === 0) {
            alert('첨부할 파일을 먼저 추가해 주세요.');
            return;
        }

        // 백엔드가 없으므로 pending 파일을 직접 success 처리 후 startSubmit
        uploader.fileManager.files.forEach(function(f) {
            if (f.status === 'pending') {
                log('⬆️  업로드 시작: ' + f.name);
                f.serverFileNm = 'SRV_' + Date.now();
                uploader.fileManager.updateStatus(f.id, 'success', new Date().toLocaleString('ko-KR'));
                log('✅ 업로드 성공: ' + f.name + ' → ' + f.serverFileNm);
            }
        });

        uploader.startSubmit();
    });

    log('🚀 filePort 초기화 완료');
</script>
</body>
</html>
